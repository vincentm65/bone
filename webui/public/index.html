<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>bone studio</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the base palette.
      try {
        var t = (JSON.parse(localStorage.getItem("bone-studio-prefs") || "{}").theme) || "codex-mono";
        if (t !== "auto") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%A0%BF%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="app">
      <!-- ── Sidebar ───────────────────────────────────────────────── -->
      <aside id="sidebar">
        <div class="sidebar-head">
          <button id="collapse-btn" class="ghost-btn" title="Hide sidebar" aria-label="Hide sidebar">
            <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
          </button>
        </div>

        <button id="new-chat" class="new-chat-btn">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          <span>New chat</span>
        </button>

        <div class="chats-label">Recent</div>
        <label class="chat-search">
          <span class="sr-only">Search conversations</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
          <input id="chat-search" type="search" placeholder="Search chats" autocomplete="off" />
        </label>
        <div id="chat-list" class="chat-list"></div>

        <div class="sidebar-foot">
        <div id="task-popup-wrap" class="task-foot hidden">
          <div id="task-popup-expanded" class="task-popup-expanded hidden">
            <div class="task-popup-head">
              <div class="task-list-title"></div>
              <div class="task-list-count"></div>
            </div>
            <div id="task-list-items" class="task-list-items"></div>
          </div>
          <div id="task-popup-collapsed" class="task-popup-collapsed">
            <svg class="task-foot-icon" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/><path d="M9 12l2 2 4-4"/></svg>
            <span id="task-popup-label" class="task-popup-label"></span>
            <button id="task-popup-toggle" class="ghost-btn task-popup-toggle-btn" title="Toggle task list" aria-label="Toggle task list">
              <svg viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
            </button>
          </div>
        </div>
        <button id="stats-btn" class="foot-btn" title="Token stats">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg>
            <span>Stats</span>
          </button>
          <button id="settings-btn" class="foot-btn">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 3.3 6.6l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H8a1.6 1.6 0 0 0 1-1.5V2a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V8a1.6 1.6 0 0 0 1.5 1H22a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
            <span>Settings</span>
          </button>
        </div>
      </aside>
      <div id="sidebar-resize" class="sidebar-resize" title="Drag to resize · double-click to reset" role="separator" aria-orientation="vertical"></div>
      <button id="sidebar-backdrop" class="sidebar-backdrop hidden" aria-label="Close sidebar"></button>

      <!-- ── Main column ───────────────────────────────────────────── -->
      <div id="main">
        <div id="global-error" class="global-error hidden" role="alert"><span id="global-error-text"></span><button id="global-error-retry" class="btn">Retry</button><button id="global-error-close" class="ghost-btn" aria-label="Dismiss error">×</button></div>
        <header id="topbar">
          <button id="show-sidebar" class="ghost-btn hidden" title="Show sidebar" aria-label="Show sidebar">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>

          <div class="topbar-right">
            <div class="meter" id="token-meter" title="Context usage">
              <div class="meter-bar"><span id="meter-fill"></span></div>
              <span id="meter-text">—</span>
            </div>
            <button id="canvas-toggle" class="ghost-btn hidden" title="Toggle canvas" aria-label="Toggle file canvas">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M14 4v16"/></svg>
            </button>
          </div>
        </header>

        <!-- chat column + canvas live side by side under the topbar -->
        <div id="work">
          <div id="chat-col">
            <main id="thread" aria-live="polite">
              <div id="welcome" class="welcome">
                <h1>bone studio</h1>
                <p>A calm, elegant front-end for your bone agent.</p>
                <div id="suggestions" class="suggestions"></div>
              </div>
            </main>
            <button id="jump-latest" class="jump-latest hidden" aria-label="Jump to latest message">↓ Latest</button>

            <!-- floating, bottom-pinned composer -->
            <div id="composer-wrap">
            <div id="command-menu" class="command-menu hidden" role="listbox" aria-label="Commands"></div>
            <!-- ask_user interactive question (source="interact" pane) — grows
                 out of the composer, sharing its width -->
            <div id="interact" class="interact hidden" role="dialog" aria-modal="false" aria-labelledby="interact-q">
              <div class="interact-card">
                <div class="interact-head">
                  <span class="interact-kicker">Question</span>
                </div>
                <div id="interact-q" class="interact-q"></div>
                <div id="interact-options" class="interact-options"></div>
                <div id="interact-foot" class="interact-foot"></div>
                <div id="interact-hint" class="interact-hint"></div>
              </div>
            </div>
            <div id="composer" class="composer">
                <div id="attachment-list" class="attachment-list" aria-live="polite"></div>
                <textarea id="input" rows="1" placeholder="Message…" autocomplete="off"></textarea>
                <div class="composer-bar">
                  <input id="attachment-input" class="sr-only" type="file" multiple accept="image/*,.txt,.md,.json,.yaml,.yml,.toml,.csv,.js,.mjs,.ts,.tsx,.jsx,.css,.html,.rs,.py,.go,.java,.c,.h,.cpp,.hpp,.sh,.sql" />
                  <button id="attachment-button" class="ghost-btn attach-btn" title="Attach images or text files" aria-label="Attach images or text files">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 11.5 12.5 20a6 6 0 0 1-8.5-8.5l9-9a4 4 0 0 1 5.7 5.7l-9 9a2 2 0 1 1-2.8-2.8l8.4-8.4"/></svg>
                  </button>
                  <button id="command-button" class="ghost-btn command-btn" title="Commands" aria-label="Open command menu" aria-haspopup="listbox" aria-expanded="false">/</button>
                  <button id="model-chip" class="pill model-pill" title="Change model" aria-haspopup="dialog" aria-expanded="false">
                    <span class="dot" id="conn-dot"></span>
                    <span id="conn-label" class="conn-label">Connecting</span>
                    <span id="model-label" class="model-pill-label">connecting…</span>
                    <svg class="chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                  </button>
                  <button id="mode-toggle" class="pill mode-safe" title="Tool approval mode">
                    <span id="mode-label">Confirm tools</span>
                  </button>
                  <span id="composer-tokens" class="composer-tokens" title="Context usage"></span>
                  <span class="grow"></span>
                  <span id="hint" class="hint">↵ send</span>
                  <button id="stop" class="round-btn stop-btn hidden" title="Stop" aria-label="Stop response">
                    <svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
                  </button>
                  <button id="send" class="round-btn send-btn" title="Send" aria-label="Send message" disabled>
                    <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- draggable divider + canvas (artifact / diff viewer) -->
          <div id="divider" class="divider hidden" role="separator" aria-label="Resize file canvas" aria-orientation="vertical" tabindex="0"></div>
          <aside id="canvas" class="canvas hidden" aria-label="File canvas">
            <div class="canvas-head">
              <div id="canvas-tabs" class="canvas-tabs" role="tablist" aria-label="Open files"></div>
              <label class="canvas-search"><span class="sr-only">Search open file</span><input id="canvas-search" type="search" placeholder="Find" /></label>
              <span id="canvas-match" class="canvas-match" aria-live="polite"></span>
              <button id="canvas-full-file" class="ghost-btn" title="Load current file from workspace" aria-label="Load current file from workspace">Full</button>
              <button id="canvas-editor" class="ghost-btn" title="Open in VS Code" aria-label="Open current file in VS Code">Editor</button>
              <button id="canvas-download" class="ghost-btn" title="Download file" aria-label="Download open file">↓</button>
              <button id="canvas-all" class="ghost-btn canvas-all hidden" title="Show all edits">All edits</button>
              <button id="canvas-close" class="ghost-btn" title="Close canvas" aria-label="Close file canvas">
                <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>
            <div id="canvas-body" class="canvas-body"></div>
          </aside>
        </div>
      </div>
    </div>

    <!-- ── Model picker popover ──────────────────────────────────────── -->
    <div id="model-pop" class="popover model-popover hidden" role="dialog" aria-modal="false" aria-label="Provider and model switcher">
      <div class="pop-head">
        <span>Provider and model</span>
        <span class="pop-head-hint">Select to switch · expand to edit</span>
      </div>
      <div id="provider-list" class="provider-list"></div>
    </div>

    <!-- ── Settings modal ────────────────────────────────────────────── -->
    <div id="settings-overlay" class="overlay hidden" aria-hidden="true">
      <div class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settings-title" tabindex="-1">
        <div class="settings-head">
          <h2 id="settings-title">Settings</h2>
          <button id="settings-close" class="ghost-btn" aria-label="Close settings">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>

        <nav class="settings-tabs">
          <button class="stab active" role="tab" aria-selected="true" data-tab="behavior">Behavior</button>
          <button class="stab" role="tab" aria-selected="false" data-tab="display">Appearance</button>
          <button class="stab" role="tab" aria-selected="false" data-tab="tools">Tools</button>
          <button class="stab" role="tab" aria-selected="false" data-tab="session">Session</button>
        </nav>

        <section class="settings-pane" data-pane="behavior">
          <div id="behavior-fields"></div>
        </section>

        <section class="settings-pane hidden" data-pane="display">
          <div id="display-fields"></div>
        </section>

        <section class="settings-pane hidden" data-pane="tools">
          <div class="section-title">Enabled tools</div>
          <div id="tools-fields" class="tools-list"></div>
        </section>

        <section class="settings-pane hidden" data-pane="session">
          <div class="section-title">This session</div>
          <div class="kv" id="settings-stats"></div>
        </section>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <div id="app-status" class="sr-only" role="status" aria-live="polite"></div>

    <!-- ── Stats overlay ─────────────────────────────────────────────── -->
    <div id="stats-overlay" class="overlay hidden" aria-hidden="true">
      <div class="stats-card" role="dialog" aria-modal="true" aria-labelledby="stats-title" tabindex="-1">
        <div class="stats-head">
          <h2 id="stats-title">Token stats</h2>
          <div class="stats-head-actions">
            <button id="stats-refresh" class="ghost-btn" title="Refresh (r)" aria-label="Refresh statistics">
              <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
            </button>
            <button id="stats-close" class="ghost-btn" title="Close (q)" aria-label="Close statistics">
              <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
          </div>
        </div>
        <div class="stats-toolbar">
          <div class="stats-modes" id="stats-modes">
            <button class="stats-mode active" data-mode="today">Today</button>
            <button class="stats-mode" data-mode="7d">7 days</button>
            <button class="stats-mode" data-mode="4w">4 weeks</button>
            <button class="stats-mode" data-mode="yearly">Yearly</button>
            <button class="stats-mode" data-mode="all">All time</button>
          </div>
          <div class="stats-summary" id="stats-range"></div>
        </div>
        <div class="stats-cards" id="stats-cards"></div>
        <div class="stats-cards-row" id="stats-cards-row"></div>
        <div class="stats-body" id="stats-body">
          <section class="stats-section">
            <div class="stats-section-title">Token usage <span class="stats-section-sub" id="stats-chart-sub"></span></div>
            <div class="stats-chart-wrap"><div id="stats-chart"></div></div>
            <div class="stats-chart-legend"><span><span class="swatch prompt"></span> Prompt</span><span><span class="swatch comp"></span> Completion</span></div>
          </section>
          <section class="stats-section">
            <div class="stats-section-title">Models</div>
            <div class="stats-models" id="stats-models"></div>
          </section>
          <section class="stats-section" id="stats-hourly-section">
            <div class="stats-section-title">By hour of day</div>
            <div class="stats-chart-wrap"><div class="stats-hourly" id="stats-hourly"></div></div>
            <div class="stats-chart-legend"><span><span class="swatch prompt"></span> Prompt</span><span><span class="swatch comp"></span> Completion</span></div>
          </section>
        </div>
        <div class="stats-footer">
          <span id="stats-refreshed"></span>
          <span class="stats-hint">r refresh · 1–5 modes · q close</span>
        </div>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
