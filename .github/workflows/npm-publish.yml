name: Publish npm package

on:
  push:
    tags:
      - 'bone-rs-v*'

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bone-linux-x64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: bone-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bone-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bone-win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: bone-rs

      - name: Package binary
        shell: bash
        run: |
          ext="${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp bone-rs/target/${{ matrix.target }}/release/bone${ext} bone-rs/bin/${{ matrix.artifact }}${ext}
          chmod +x bone-rs/bin/${{ matrix.artifact }}${ext}

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: bone-rs-${{ matrix.artifact }}
          path: bone-rs/

  publish-npm:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bone-rs-*
          path: bone-rs/bin/
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci
        working-directory: bone-rs

      - name: Pack
        run: npm pack
        working-directory: bone-rs

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: bone-rs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
