name: task_list
version: 4
description: "Manage a persistent task list displayed in the bottom pane. Actions: create (bulk-add tasks), complete (mark done by index/name), kill (destroy the list). Agent calls kill after all tasks are done."
safety: safe
output:
  kind: line_envelope
display:
  show: false
args:
  - name: action
    type: string
    description: "create, complete, or kill"
    required: true
  - name: text
    type: string
    description: "Single task name. Used with complete to match by name."
    required: false
  - name: texts
    type: array
    description: "Multiple task strings for create, or multiple task names for complete."
    required: false
  - name: index
    type: integer
    description: "Single 1-based task index for complete."
    required: false
  - name: indices
    type: array
    description: "Multiple 1-based task indices for complete."
    required: false
script: |
  uv run -- python3 -c "
  import json, os, pathlib, sys

  def bone_dir():
      xdg = os.environ.get('XDG_CONFIG_HOME')
      if xdg:
          return pathlib.Path(xdg) / 'bone-rust'
      home = os.environ.get('HOME') or os.environ.get('USERPROFILE')
      if home:
          return pathlib.Path(home) / '.bone-rust'
      return pathlib.Path('/tmp/.bone-rust')

  dir_path = bone_dir() / 'tasks' / os.environ.get('BONE_PID', str(os.getpid()))
  dir_path.mkdir(parents=True, exist_ok=True)
  tasks_file = dir_path / 'tasks.txt'
  done_file = dir_path / 'tasks_done.txt'

  def read_lines(p):
      return p.read_text().splitlines() if p.exists() else []

  def write_lines(p, lines):
      p.write_text('\n'.join(lines) + ('\n' if lines else ''))

  def append_line(p, line):
      with open(p, 'a') as f:
          f.write(line + '\n')

  def total_tasks():
      return len(read_lines(tasks_file))

  def done_count():
      return len(read_lines(done_file))

  def get_texts():
      count = int(os.environ.get('TOOL_TEXTS_COUNT', '0'))
      if count > 0:
          return [os.environ.get(f'TOOL_TEXTS_{i}', '') for i in range(count)]
      t = os.environ.get('TOOL_TEXT', '')
      return [t] if t else []

  def get_indices():
      count = int(os.environ.get('TOOL_INDICES_COUNT', '0'))
      if count > 0:
          return [int(os.environ.get(f'TOOL_INDICES_{i}', '0')) for i in range(count)]
      idx = os.environ.get('TOOL_INDEX', '')
      return [int(idx)] if idx else []

  def resolve_name(name):
      tasks = read_lines(tasks_file)
      for i, t in enumerate(tasks):
          if t == name:
              return i + 1
      name_low = name.lower()
      for i, t in enumerate(tasks):
          if t.lower() == name_low:
              return i + 1
      return None

  def get_targets():
      indices = get_indices()
      texts = get_texts()
      if indices and texts:
          print('ERROR: Use either indices or names, not both.', file=sys.stderr)
          sys.exit(1)
      if indices:
          return indices
      if texts:
          result = []
          for name in texts:
              idx = resolve_name(name)
              if idx is None:
                  print(f'ERROR: No task found: {name}', file=sys.stderr)
                  sys.exit(1)
              result.append(idx)
          return result
      print('ERROR: Provide index, indices, text, or texts.', file=sys.stderr)
      sys.exit(1)

  def emit_pane(msg, scroll=0):
      total = total_tasks()
      done = done_count()
      title = f'Task List ({done}/{total})' if total > 0 else 'Task List'
      print('@@content@@')
      print(msg)
      print('@@pane@@')
      print('source: task_list')
      print(f'title: {title}')
      print('visible_rows: 8')
      print(f'scroll: {scroll}')
      print('@@lines@@')
      if total > 0:
          tasks = read_lines(tasks_file)
          done_items = set(read_lines(done_file))
          for t in tasks:
              mark = '\u2713' if t in done_items else '\u25cb'
              print(f'  {mark} {t}')
      else:
          print('  No tasks')
      print('@@end@@')

  def emit_empty_pane(msg):
      print('@@content@@')
      print(msg)
      print('@@pane@@')
      print('source: task_list')
      print('title: Task List')
      print('visible_rows: 8')
      print('scroll: 0')
      print('@@lines@@')
      print('@@end@@')

  action = os.environ.get('TOOL_ACTION', '')

  if action == 'kill':
      tasks_file.unlink(missing_ok=True)
      done_file.unlink(missing_ok=True)
      emit_empty_pane('Task list killed.')
  elif action == 'create':
      texts = get_texts()
      if not texts:
          print(\"ERROR: Provide text or texts for 'create'.\", file=sys.stderr)
          sys.exit(1)
      write_lines(tasks_file, texts)
      write_lines(done_file, [])
      count = len(texts)
      msg = f'Created {count} task(s).' if count > 1 else f'Created task: {texts[0]}'
      emit_pane(msg, 0)
  elif action == 'complete':
      if not tasks_file.exists():
          print(\"ERROR: No task list exists. Use 'create' first.\", file=sys.stderr)
          sys.exit(1)
      targets = get_targets()
      tasks = read_lines(tasks_file)
      done_items = set(read_lines(done_file))
      for idx in targets:
          task = tasks[idx - 1]
          if task not in done_items:
              append_line(done_file, task)
              done_items.add(task)
      total = total_tasks()
      done = done_count()
      first = targets[0]
      first_task = tasks[first - 1]
      if len(targets) == 1:
          msg = f'Completed: {first_task}'
      else:
          msg = f'Completed {len(targets)} tasks.'
      if done == total:
          msg += ' All done -- you can kill the list.'
      scroll = max(0, first - 1)
      emit_pane(msg, scroll)
  else:
      print('ERROR: Action must be create, complete, or kill.', file=sys.stderr)
      sys.exit(1)
  "
