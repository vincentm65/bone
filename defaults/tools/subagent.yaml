name: subagent
version: 1
description: "Run a Bone sub-agent with a chosen approval mode. Optionally override provider and model; omitted values use the last/default provider and that provider's configured model."
safety: read_only
args:
  - name: approval
    type: string
    required: true
    description: "Approval mode - read_only, edit, or danger."
  - name: task
    type: string
    required: true
    description: "Task for the sub-agent."
  - name: provider
    type: string
    description: "Optional provider id. If omitted, uses the last/default provider from config."
  - name: model
    type: string
    description: "Optional model name. If omitted, uses the selected provider's configured model."
script: |
  set -euo pipefail

  approval="${TOOL_APPROVAL:-read_only}"
  task="${TOOL_TASK:-}"

  args=(agent --events --approval "$approval" --prompt "$task")
  if [ -n "${TOOL_PROVIDER:-}" ]; then
    args+=(--provider "$TOOL_PROVIDER")
  fi
  if [ -n "${TOOL_MODEL:-}" ]; then
    args+=(--model "$TOOL_MODEL")
  fi

  uv run -- python3 - "$approval" "$task" "${TOOL_CALL_ID:-}" "${args[@]}" <<'PY'
  import json
  import os
  import pathlib
  import subprocess
  import sys
  import threading
  import time

  try:
      import fcntl
  except Exception:
      fcntl = None

  approval = sys.argv[1]
  task = sys.argv[2]
  call_id = sys.argv[3]
  args = sys.argv[4:]

  def bone_dir():
      xdg = os.environ.get("XDG_CONFIG_HOME")
      if xdg:
          return pathlib.Path(xdg) / "bone-rust"
      home = os.environ.get("HOME") or os.environ.get("USERPROFILE")
      if home:
          return pathlib.Path(home) / ".bone-rust"
      return pathlib.Path("/tmp/.bone-rust")

  def short_mode(value):
      return {"read_only": "read", "edit": "edit", "danger": "danger"}.get(value, (value or "?")[:6])

  def short_title(value):
      first = (value or "").splitlines()[0].strip()
      return first or "subagent"

  def fmt_tokens(sent, received):
      total = int(sent or 0) + int(received or 0)
      if total >= 1_000_000:
          return f"{total / 1_000_000:.1f}M"
      if total >= 1000:
          return f"{total / 1000:.1f}k"
      return str(total)

  def clip(value, width):
      value = " ".join(str(value or "").split())
      return value if len(value) <= width else value[:max(0, width - 3)] + "..."

  def clean(value):
      return " ".join(str(value or "").split())

  def compact_status(message):
      message = " ".join(str(message or "").split())
      if message.startswith("running shell: "):
          return message[len("running shell: "):]
      if message.startswith("running "):
          return message[len("running "):]
      return message or "running"

  state = {
      "approval": approval,
      "mode": short_mode(approval),
      "task": task,
      "log": [],
      "title": short_title(task),
      "model": "current",
      "now": "starting",
      "sent": 0,
      "received": 0,
      "started": time.time(),
      "done": False,
  }

  agent_id = call_id or f"{state['mode']}-{os.getpid()}"
  pane_source = "subagents"
  state_dir = bone_dir() / "subagents" / os.environ.get("BONE_PID", str(os.getppid()))
  state_dir.mkdir(parents=True, exist_ok=True)
  state_file = state_dir / "state.json"
  lock_file = state_dir / "state.lock"

  class StateLock:
      def __enter__(self):
          self.handle = open(lock_file, "w")
          if fcntl:
              fcntl.flock(self.handle, fcntl.LOCK_EX)
          return self

      def __exit__(self, exc_type, exc, tb):
          if fcntl:
              fcntl.flock(self.handle, fcntl.LOCK_UN)
          self.handle.close()

  def read_agents():
      if not state_file.exists():
          return {}
      try:
          data = json.loads(state_file.read_text())
          return data if isinstance(data, dict) else {}
      except Exception:
          return {}

  def write_agents(agents):
      if agents:
          state_file.write_text(json.dumps(agents, sort_keys=True))
      else:
          state_file.unlink(missing_ok=True)

  def token_text(entry):
      return f"{fmt_tokens(entry.get('sent'), entry.get('received'))} tok"

  def list_line(entry, mode_width, model_width, token_width):
      status = "\u2713" if entry.get("done") else "\u25cb"
      mode = clean(entry.get("mode") or "?")
      model = clean(entry.get("model") or "current")
      tokens = token_text(entry)
      title = clean(entry.get("title") or "subagent")
      return f"  {status} {mode:<{mode_width}}  {model:<{model_width}}  {tokens:<{token_width}}  {title}"

  def emit_pane(remove=False):
      with StateLock():
          agents = read_agents()
          if remove:
              agents.pop(agent_id, None)
          else:
              agents[agent_id] = state.copy()
          write_agents(agents)

          ordered = sorted(agents.values(), key=lambda entry: entry.get("started", 0))
          running = sum(1 for entry in ordered if not entry.get("done"))
          title = f"Subagents ({running})" if ordered else "Subagents"
          visible = 8
          mode_width = max([len("MODE")] + [len(clean(entry.get("mode") or "?")) for entry in ordered])
          model_width = max([len("MODEL")] + [len(clean(entry.get("model") or "current")) for entry in ordered])
          token_width = max([len("TOKENS")] + [len(token_text(entry)) for entry in ordered])
          lines = [f"    {'MODE':<{mode_width}}  {'MODEL':<{model_width}}  {'TOKENS':<{token_width}}  TASK"]
          lines.extend(list_line(entry, mode_width, model_width, token_width) for entry in ordered)
          pane = {
              "source": pane_source,
              "title": title,
              "visible_rows": visible,
              "scroll": max(0, len(lines) - visible) if ordered else 0,
              "lines": lines,
          }
          if not ordered:
              pane["lines"] = []
      print(json.dumps({"type": "pane", "pane": pane}), flush=True)

  emit_pane()

  proc = subprocess.Popen(
      ["bone"] + args,
      stdout=subprocess.PIPE,
      stderr=subprocess.PIPE,
      text=True,
      bufsize=1,
  )
  stderr_lines = []

  def drain_stderr():
      if proc.stderr is None:
          return
      for err_line in proc.stderr:
          stderr_lines.append(err_line)

  stderr_thread = threading.Thread(target=drain_stderr, daemon=True)
  stderr_thread.start()

  for line in proc.stdout:
      line = line.rstrip("\n")
      print(line, flush=True)
      try:
          event = json.loads(line)
      except Exception:
          continue

      event_type = event.get("type")
      if event_type == "started":
          state["approval"] = event.get("approval") or state["approval"]
          state["mode"] = short_mode(state["approval"])
          state["model"] = event.get("model") or state["model"]
          state["task"] = event.get("task") or state["task"]
          state["title"] = short_title(state["task"])
          state["now"] = "thinking"
          state["done"] = False
          state["log"].append("thinking")
      elif event_type == "status":
          msg = compact_status(event.get("message"))
          state["now"] = msg
          state["done"] = False
          if not state["log"] or state["log"][-1] != msg:
              state["log"].append(msg)
      elif event_type == "tool_call":
          name = event.get("name") or "tool"
          summary = event.get("summary") or ""
          entry = f"> {name}: {summary}" if summary else f"> {name}"
          state["now"] = entry
          state["done"] = False
          state["log"].append(entry)
      elif event_type == "token_usage":
          state["sent"] = event.get("sent") or 0
          state["received"] = event.get("received") or 0
      elif event_type == "finished":
          entry = f"done | {fmt_tokens(state['sent'], state['received'])} tok"
          state["now"] = "done"
          state["done"] = True
          state["log"].append(entry)
      elif event_type == "failed":
          msg = str(event.get("message") or "error")
          state["now"] = "failed"
          state["done"] = True
          state["log"].append(f"FAILED: {msg}")

      emit_pane()

  code = proc.wait()
  stderr_thread.join(timeout=1)
  stderr = "".join(stderr_lines)
  if stderr:
      print(stderr, file=sys.stderr, end="")

  emit_pane(remove=True)
  sys.exit(code)
  PY
output:
  kind: jsonl_events
display:
  args: [approval, task, provider, model]
