name: task_list
version: 12
description: "Manage a named visible task list. State is held by the host; no state arg needed. Actions: create (pass texts and optional name, max 15 tasks), complete (pass index/indices), kill."
safety: safe
output:
  kind: json_envelope
display:
  show: false
  template: "{action}"
  show_result: false
  args:
    - action
    - name
    - texts
    - index
    - indices
args:
  - name: action
    type: string
    description: "create, complete, or kill"
    required: true
  - name: name
    type: string
    description: "Optional task list name for create."
    required: false
  - name: texts
    type: array
    description: "Task strings for create."
    required: false
  - name: index
    type: integer
    description: "Single 1-based task index for complete."
    required: false
  - name: indices
    type: array
    description: "Multiple 1-based task indices for complete."
    required: false
script: |
  uv run -- python3 -c "
  import os, sys, json

  DEFAULT_NAME = 'Tasks'

  def get_texts():
      count = int(os.environ.get('TOOL_TEXTS_COUNT', '0'))
      return [os.environ.get(f'TOOL_TEXTS_{i}', '') for i in range(count)] if count > 0 else []

  def get_indices():
      count = int(os.environ.get('TOOL_INDICES_COUNT', '0'))
      if count > 0:
          return [int(os.environ.get(f'TOOL_INDICES_{i}', '0')) for i in range(count)]
      idx = os.environ.get('TOOL_INDEX', '')
      return [int(idx)] if idx else []

  def styled_line(text, done):
      if done:
          return {'spans': [
              {'text': '  ✓ ', 'fg': 'green', 'modifiers': ['bold']},
              {'text': text, 'fg': 'dark_gray', 'modifiers': ['strike']},
          ]}
      return {'spans': [
          {'text': '  ○ ', 'fg': 'dark_gray'},
          {'text': text, 'fg': 'white'},
      ]}

  def emit(state):
      tasks = state.get('tasks', [])
      done = sum(1 for t in tasks if t[1])
      total = len(tasks)
      name = state.get('name') or DEFAULT_NAME
      lines = [styled_line(t[0], t[1]) for t in tasks]
      print(json.dumps({
          'content': f'{done}/{total} done',
          'state': json.dumps(state),
          'pane': {
              'source': 'task_list',
              'title': f'{name} ({done}/{total})',
              'visible_rows': 8,
              'scroll': 0,
              'lines': lines,
          }
      }))

  action = os.environ.get('TOOL_ACTION', '')

  if action == 'kill':
      print(json.dumps({
          'content': 'Task list cleared.',
          'pane': {'source': 'task_list', 'title': DEFAULT_NAME, 'lines': []}
      }))

  elif action == 'create':
      texts = get_texts()
      if not texts:
          print(\"ERROR: Provide texts for 'create'.\", file=sys.stderr)
          sys.exit(1)
      if len(texts) > 15:
          print('ERROR: Maximum 15 tasks allowed.', file=sys.stderr)
          sys.exit(1)
      name = os.environ.get('TOOL_NAME') or DEFAULT_NAME
      state = {'name': name, 'tasks': [[t, False] for t in texts]}
      emit(state)

  elif action == 'complete':
      raw = os.environ.get('TOOL_SESSION_STATE', '')
      if not raw:
          print('ERROR: No task list state found. Create one first with action=create.', file=sys.stderr)
          sys.exit(1)
      try:
          state = json.loads(raw)
      except json.JSONDecodeError:
          print('ERROR: Invalid state JSON.', file=sys.stderr)
          sys.exit(1)
      indices = get_indices()
      if not indices:
          print('ERROR: Provide index or indices.', file=sys.stderr)
          sys.exit(1)
      tasks = state.get('tasks', [])
      bad = [idx for idx in indices if idx < 1 or idx > len(tasks)]
      if bad:
          print(f'ERROR: Invalid task index/indices: {bad}', file=sys.stderr)
          sys.exit(1)
      for idx in indices:
          tasks[idx - 1][1] = True
      if all(t[1] for t in tasks):
          summary = ', '.join(t[0] for t in tasks)
          print(json.dumps({
              'content': f'All tasks completed: {summary}',
              'pane': {'source': 'task_list', 'title': 'Tasks', 'lines': []}
          }))
      else:
          emit(state)

  else:
      print('ERROR: Action must be create, complete, or kill.', file=sys.stderr)
      sys.exit(1)
  "
