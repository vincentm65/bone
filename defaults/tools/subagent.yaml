name: subagent
version: 3
description: "Spawn a sub-agent to handle a self-contained task. Use this to delegate work that benefits from isolation or parallelism: researching a topic, investigating a codebase area, prototyping a solution, getting a second opinion, or running a complex multi-step workflow. The sub-agent runs as a separate bone instance with its own context and tool access. Pass a clear, specific task prompt; the sub-agent will use the full set of tools available to it. Choose the approval mode to control what the sub-agent can do: read_only for research, edit for changes, danger for privileged operations. Optionally override provider and model; omitted values use config/subagent.yaml, then the last/default provider and its configured model."
safety: read_only
live_state:
  cleanup: on_finish
args:
  - name: approval
    type: string
    required: true
    description: "Approval mode - read_only, edit, or danger."
  - name: task
    type: string
    required: true
    description: "Task for the sub-agent."
  - name: provider
    type: string
    description: "Optional provider id. If omitted, uses config/subagent.yaml, then the last/default provider."
  - name: model
    type: string
    description: "Optional model name. If omitted, uses config/subagent.yaml, then the selected provider's configured model."
script: |
  set -euo pipefail

  approval="${TOOL_APPROVAL:-read_only}"
  task="${TOOL_TASK:-}"

  bone_bin="${BONE_BIN:-bone}"
  if [ ! -x "$bone_bin" ]; then
    bone_bin="$(command -v bone || printf '%s' "$bone_bin")"
  fi

  args=(agent --events --approval "$approval" --prompt "$task")
  if [ -n "${TOOL_PROVIDER:-}" ]; then
    args+=(--provider "$TOOL_PROVIDER")
  fi
  if [ -n "${TOOL_MODEL:-}" ]; then
    args+=(--model "$TOOL_MODEL")
  fi
  uv run -- python3 - "$approval" "$task" "${TOOL_CALL_ID:-}" "$bone_bin" "${args[@]}" <<'PY'
  import json
  import os
  import subprocess
  import sys
  import threading
  import time

  approval = sys.argv[1]
  task = sys.argv[2]
  call_id = sys.argv[3]
  bone_bin = sys.argv[4]
  args = sys.argv[5:]

  def short_mode(value):
      return {"read_only": "read", "edit": "edit", "danger": "danger"}.get(value, (value or "?")[:6])

  def short_title(value):
      first = (value or "").splitlines()[0].strip()
      return first or "subagent"

  def clean(value):
      return " ".join(str(value or "").split())

  def fmt_tokens(sent, received):
      total = int(sent or 0) + int(received or 0)
      if total >= 1_000_000:
          return f"{total / 1_000_000:.1f}M"
      if total >= 1000:
          return f"{total / 1000:.1f}k"
      return str(total)

  state = {
      "approval": approval,
      "mode": short_mode(approval),
      "task": task,
      "log": [],
      "title": short_title(task),
      "model": "current",
      "now": "starting",
      "sent": 0,
      "received": 0,
      "started": time.time(),
      "done": False,
  }

  agent_id = call_id or f"{state['mode']}-{os.getpid()}"
  pane_source = "subagents"

  def token_text():
      return f"{fmt_tokens(state['sent'], state['received'])} tok"

  def emit_pane(remove=False):
      event = {"type": "pane", "state_key": agent_id}
      if not remove:
          event["state"] = json.dumps(state)
          tokens = token_text()
          title = clean(state.get("title") or "subagent")
          mode = clean(state.get("mode") or "?")
          model = clean(state.get("model") or "current")
          line = f"  {'✓' if state.get('done') else '○'} {mode}  {model}  {tokens}  {title}"
          event["pane"] = {
              "source": pane_source,
              "title": title,
              "visible_rows": 8,
              "scroll": 0,
              "lines": [line],
          }
      else:
          event["remove"] = True
          event["pane"] = {
              "source": pane_source,
              "title": "",
              "visible_rows": 8,
              "scroll": 0,
              "lines": [],
          }
      print(json.dumps(event), flush=True)

  proc = None
  stderr_thread = None
  stderr_lines = []
  code = 1

  try:
      emit_pane()

      proc = subprocess.Popen(
          [bone_bin] + args,
          stdout=subprocess.PIPE,
          stderr=subprocess.PIPE,
          text=True,
          bufsize=1,
      )

      def drain_stderr():
          if proc.stderr is None:
              return
          for err_line in proc.stderr:
              stderr_lines.append(err_line)

      stderr_thread = threading.Thread(target=drain_stderr, daemon=True)
      stderr_thread.start()

      for line in proc.stdout:
          line = line.rstrip("\n")
          print(line, flush=True)
          try:
              event = json.loads(line)
          except Exception:
              continue

          event_type = event.get("type")
          if event_type == "started":
              state["approval"] = event.get("approval") or state["approval"]
              state["mode"] = short_mode(state["approval"])
              state["model"] = event.get("model") or state["model"]
              state["task"] = event.get("task") or state["task"]
              state["title"] = short_title(state["task"])
              state["now"] = "thinking"
              state["done"] = False
              state["log"].append("thinking")
          elif event_type == "status":
              msg = event.get("message") or ""
              msg = " ".join(str(msg).split())
              if msg.startswith("running shell: "):
                  msg = msg[len("running shell: "):]
              elif msg.startswith("running "):
                  msg = msg[len("running "):]
              state["now"] = msg or "running"
              state["done"] = False
              if not state["log"] or state["log"][-1] != msg:
                  state["log"].append(msg)
          elif event_type == "tool_call":
              name = event.get("name") or "tool"
              summary = event.get("summary") or ""
              entry = f"> {name}: {summary}" if summary else f"> {name}"
              state["now"] = entry
              state["done"] = False
              state["log"].append(entry)
          elif event_type == "token_usage":
              state["sent"] = event.get("sent") or 0
              state["received"] = event.get("received") or 0
          elif event_type == "finished":
              entry = f"done | {fmt_tokens(state['sent'], state['received'])} tok"
              state["now"] = "done"
              state["done"] = True
              state["log"].append(entry)
          elif event_type == "failed":
              msg = str(event.get("message") or "error")
              state["now"] = "failed"
              state["done"] = True
              state["log"].append(f"FAILED: {msg}")

          emit_pane()

      code = proc.wait()
  except Exception as err:
      state["now"] = "failed"
      state["done"] = True
      state["log"].append(f"FAILED: {err}")
      emit_pane()
  finally:
      if proc is not None and proc.poll() is None:
          try:
              proc.kill()
          except OSError:
              pass
          try:
              proc.wait()
          except Exception:
              pass
      if stderr_thread is not None:
          stderr_thread.join(timeout=1)
      stderr = "".join(stderr_lines)
      if stderr:
          print(stderr, file=sys.stderr, end="")
      emit_pane(remove=True)

  sys.exit(code)
  PY
output:
  kind: jsonl_events
display:
  args: [approval, task, provider, model]
