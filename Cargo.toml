[package]
name = "bone"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
ratatui = { version = "0.29", features = ["scrolling-regions"] }
crossterm = "0.28"
eventsource-stream = "0.2"
async-trait = "0.1"
futures-util = "0.3"
async-stream = "0.3"
unicode-width = "0.2"
sha2 = "0.10"
similar = "2"
dirs = "6"
num-format = "0.4.4"
