# Example providers configuration for bone-rust.
# Seeded to ~/.bone-rust/config/providers.yaml. Fill in your API keys there.
#
# On first run, bone-rust will copy this file automatically if no
# config/providers.yaml exists. Edit the seeded copy — this file is never overwritten.

last_provider: local

openai:
  label: OpenAI
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  api_key: ''
  endpoint: /chat/completions
  handler: openai
