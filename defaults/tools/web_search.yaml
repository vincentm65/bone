version: 3
name: web_search
description: "Search the web for information using DuckDuckGo. Returns titles, URLs and summaries. Useful for looking up documentation, current events, technical topics, and general knowledge."
args:
  - name: query
    type: string
    description: "The search query"
    required: true
  - name: num_results
    type: integer
    description: "Number of results to return (default 5, max 10)"
    required: false
script: |
  uv run --with ddgs -- python3 -c "
  import json, os, sys
  from ddgs import DDGS

  query = os.environ['TOOL_QUERY']
  num = int(os.environ.get('TOOL_NUM_RESULTS', '5'))
  num = max(1, min(10, num))

  with DDGS() as ddgs:
      results = list(ddgs.text(query, max_results=num))

  for r in results:
      print(json.dumps(r))
  "
