name: task_list
version: 2
description: "Manage a persistent task list displayed in the bottom pane. Actions: create (bulk-add tasks), complete (mark done by index/name), kill (destroy the list). Agent calls kill after all tasks are done."
safety: safe
output:
  kind: line_envelope
display:
  show: false
args:
  - name: action
    type: string
    description: "create, complete, or kill"
    required: true
  - name: text
    type: string
    description: "Single task name. Used with complete to match by name."
    required: false
  - name: texts
    type: array
    description: "Multiple task strings for create, or multiple task names for complete."
    required: false
  - name: index
    type: integer
    description: "Single 1-based task index for complete."
    required: false
  - name: indices
    type: array
    description: "Multiple 1-based task indices for complete."
    required: false
script: |
  set -euo pipefail

  # ── config directory ────────────────────────────────────────────────
  bone_dir() {
    if [ -n "${XDG_CONFIG_HOME:-}" ]; then
      echo "$XDG_CONFIG_HOME/bone-rust"
    elif [ -n "${HOME:-}" ]; then
      echo "$HOME/.bone-rust"
    elif [ -n "${USERPROFILE:-}" ]; then
      echo "$USERPROFILE/.bone-rust"
    else
      echo "/tmp/.bone-rust"
    fi
  }

  DIR="$(bone_dir)/tasks/${BONE_PID:-$$}"
  TASKS_FILE="$DIR/tasks.txt"
  DONE_FILE="$DIR/tasks_done.txt"
  mkdir -p "$DIR"

  # ── helpers ─────────────────────────────────────────────────────────
  total_tasks()    { [ -f "$TASKS_FILE" ] && wc -l < "$TASKS_FILE" || echo 0; }
  done_count()     { [ -f "$DONE_FILE" ] && wc -l < "$DONE_FILE" || echo 0; }

  emit_pane() {
    local msg="$1" scroll="${2:-0}"
    local total done title
    total=$(total_tasks)
    done=$(done_count)
    if [ "$total" -gt 0 ]; then
      title="Task List ($done/$total)"
    else
      title="Task List"
    fi
    printf '@@content@@\n'
    printf '%s\n' "$msg"
    printf '@@pane@@\n'
    printf 'source: task_list\n'
    printf 'title: %s\n' "$title"
    printf 'visible_rows: 8\n'
    printf 'scroll: %s\n' "$scroll"
    printf '@@lines@@\n'
    if [ "$total" -gt 0 ]; then
      i=0
      while IFS= read -r task; do
        if [ -f "$DONE_FILE" ] && grep -qxF "$task" "$DONE_FILE" 2>/dev/null; then
          printf '  \u2713 %s\n' "$task"
        else
          printf '  \u25cb %s\n' "$task"
        fi
        i=$((i + 1))
      done < "$TASKS_FILE"
    else
      printf '  No tasks\n'
    fi
    printf '@@end@@\n'
  }

  emit_empty_pane() {
    local msg="$1"
    printf '@@content@@\n'
    printf '%s\n' "$msg"
    printf '@@pane@@\n'
    printf 'source: task_list\n'
    printf 'title: Task List\n'
    printf 'visible_rows: 8\n'
    printf 'scroll: 0\n'
    printf '@@lines@@\n'
    printf '@@end@@\n'
  }

  # ── read indexed array env vars ─────────────────────────────────────
  get_texts() {
    local count="${TOOL_TEXTS_COUNT:-0}"
    if [ "$count" -gt 0 ]; then
      for i in $(seq 0 $((count - 1))); do
        eval "printf '%s\n' \"\${TOOL_TEXTS_$i:-}\""
      done
      return
    fi
    if [ -n "${TOOL_TEXT:-}" ]; then
      printf '%s\n' "$TOOL_TEXT"
    fi
  }

  get_indices() {
    local count="${TOOL_INDICES_COUNT:-0}"
    if [ "$count" -gt 0 ]; then
      for i in $(seq 0 $((count - 1))); do
        eval "printf '%s\n' \"\${TOOL_INDICES_$i:-}\""
      done
      return
    fi
    if [ -n "${TOOL_INDEX:-}" ]; then
      printf '%s\n' "$TOOL_INDEX"
    fi
  }

  # ── resolve task name(s) to line number(s) ──────────────────────────
  resolve_name() {
    local name="$1" total
    total=$(total_tasks)
    # Exact match first
    local line=0
    while IFS= read -r task; do
      line=$((line + 1))
      if [ "$task" = "$name" ]; then
        printf '%s\n' "$line"
        return
      fi
    done < "$TASKS_FILE"
    # Case-insensitive fallback
    line=0
    local name_lower
    name_lower=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
    while IFS= read -r task; do
      line=$((line + 1))
      task_lower=$(printf '%s' "$task" | tr '[:upper:]' '[:lower:]')
      if [ "$task_lower" = "$name_lower" ]; then
        printf '%s\n' "$line"
        return
      fi
    done < "$TASKS_FILE"
    printf ''  # not found
  }

  # ── get target indices from index/name args ─────────────────────────
  get_targets() {
    local indices names
    indices=$(get_indices)
    names=$(get_texts)
    if [ -n "$indices" ] && [ -n "$names" ]; then
      echo "ERROR: Use either indices or names, not both." >&2
      exit 1
    fi
    if [ -n "$indices" ]; then
      printf '%s\n' "$indices"
      return
    fi
    if [ -n "$names" ]; then
      for name in $names; do
        local idx
        idx=$(resolve_name "$name")
        if [ -z "$idx" ]; then
          echo "ERROR: No task found: $name" >&2
          exit 1
        fi
        printf '%s\n' "$idx"
      done
      return
    fi
    echo "ERROR: Provide index, indices, text, or texts." >&2
    exit 1
  }

  # ── main ────────────────────────────────────────────────────────────
  action="${TOOL_ACTION:-}"

  case "$action" in
    kill)
      rm -f "$TASKS_FILE" "$DONE_FILE"
      emit_empty_pane "Task list killed."
      ;;

    create)
      texts=$(get_texts)
      if [ -z "$texts" ]; then
        echo "ERROR: Provide text or texts for 'create'." >&2
        exit 1
      fi
      # Overwrite task files with new list
      printf '%s\n' "$texts" > "$TASKS_FILE"
      : > "$DONE_FILE"
      count=$(total_tasks)
      if [ "$count" -gt 1 ]; then
        msg="Created $count task(s)."
      else
        msg="Created task: $(head -1 "$TASKS_FILE")"
      fi
      emit_pane "$msg" 0
      ;;

    complete)
      if [ ! -f "$TASKS_FILE" ]; then
        echo "ERROR: No task list exists. Use 'create' first." >&2
        exit 1
      fi
      targets=$(get_targets)
      if [ -z "$targets" ]; then
        exit 1
      fi
      # Mark each target task as done
      for idx in $targets; do
        task=$(sed -n "${idx}p" "$TASKS_FILE")
        # Add to done file if not already there
        if ! grep -qxF "$task" "$DONE_FILE" 2>/dev/null; then
          printf '%s\n' "$task" >> "$DONE_FILE"
        fi
      done
      total=$(total_tasks)
      done=$(done_count)
      # Build completion message
      first=$(printf '%s\n' "$targets" | head -1)
      first_task=$(sed -n "${first}p" "$TASKS_FILE")
      target_count=$(printf '%s\n' "$targets" | wc -l)
      if [ "$target_count" -eq 1 ]; then
        msg="Completed: $first_task"
      else
        msg="Completed $target_count tasks."
      fi
      if [ "$done" -eq "$total" ]; then
        msg="$msg All done -- you can kill the list."
      fi
      scroll=$((first - 1))
      [ "$scroll" -lt 0 ] && scroll=0
      emit_pane "$msg" "$scroll"
      ;;

    *)
      echo "ERROR: Action must be create, complete, or kill." >&2
      exit 1
      ;;
  esac
